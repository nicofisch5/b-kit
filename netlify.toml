# Netlify Configuration for B-Strack

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Netlify Blobs storage for analytics
[blobs]
  regions = ["us-east-1"]

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# API redirects to Netlify Functions
[[redirects]]
  from = "/api/track"
  to = "/.netlify/functions/track"
  status = 200

[[redirects]]
  from = "/api/analytics/summary"
  to = "/.netlify/functions/analytics-summary"
  status = 200

[[redirects]]
  from = "/api/analytics/export"
  to = "/.netlify/functions/analytics-export"
  status = 200

# Redirects for SPA (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables (set these in Netlify UI)
# NETLIFY_BLOBS_CONTEXT = production
