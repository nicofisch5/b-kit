services:
  php:
    build:
      context: ./api/docker/php
    volumes:
      - ./api:/var/www/api
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://bkit:bkit_secret@database:3306/bkit?serverVersion=10.11.0-MariaDB"
    networks:
      - bkit

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./api:/var/www/api
      - ./api/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - bkit

  database:
    image: mariadb:10.11
    ports:
      - "3307:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root_secret
      MARIADB_DATABASE: bkit
      MARIADB_USER: bkit
      MARIADB_PASSWORD: bkit_secret
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bkit

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on:
      - database
    networks:
      - bkit

volumes:
  db_data:

networks:
  bkit:
